---
# Tiny Tapeout project information
project:
  title:        "Int7+1 Sparse TPU"
  author:       "Kashif"
  discord:      ""
  description:  "4x4 systolic array with 1:2 structured sparsity baked into the data format. 7-bit INT weights where the 8th bit selects which of two adjacent entries is non-zero. Sparsity for free — no pruning needed."
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "1x1"
  top_module:  "tt_um_kashif_int7_sparse_tpu"

  source_files:
    - "project.v"
    - "pe.v"
    - "systolic_array_4x4.v"
    - "control_fsm.v"

pinout:
  # Inputs
  ui[0]: "act_b bit 0 / weight bit 0"
  ui[1]: "act_b bit 1 / weight bit 1"
  ui[2]: "act_b bit 2 / weight bit 2"
  ui[3]: "act_b bit 3 / weight bit 3"
  ui[4]: "act_a bit 0 / weight bit 4"
  ui[5]: "act_a bit 1 / weight bit 5"
  ui[6]: "act_a bit 2 / weight bit 6"
  ui[7]: "act_a bit 3 / weight bit 7 (select)"

  # Outputs
  uo[0]: "result byte bit 0"
  uo[1]: "result byte bit 1"
  uo[2]: "result byte bit 2"
  uo[3]: "result byte bit 3"
  uo[4]: "result byte bit 4"
  uo[5]: "result byte bit 5"
  uo[6]: "result byte bit 6"
  uo[7]: "result byte bit 7"

  # Bidirectional pins
  uio[0]: "relu_en (compute mode)"
  uio[1]: "load_idx bit 0"
  uio[2]: "load_idx bit 1"
  uio[3]: "load_idx bit 2"
  uio[4]: "load_idx bit 3"
  uio[5]: ""
  uio[6]: "mode bit 0"
  uio[7]: "mode bit 1 / done (output mode)"
