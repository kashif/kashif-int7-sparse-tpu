---
# Tiny Tapeout project information
project:
  title:        "Int7+1 Sparse Mini-TPU"
  author:       "Kashif"
  discord:      ""
  description:  "3x3 systolic array with Int7+1 weights: 1:2 structured sparsity along the contraction axis, baked into the data format. A 4-bit mux replaces a second multiplier — 2 contraction steps per cycle. Native int8 dense mode at half rate runs off-the-shelf quantized models."
  language:     "Verilog"
  clock_hz:     5000000

  tiles: "2x2"
  top_module:  "tt_um_kashif_int7_sparse_tpu"

  source_files:
    - "project.v"
    - "tpu.v"
    - "spi.v"
    - "control.v"
    - "memory_a.v"
    - "memory_b.v"
    - "array.v"
    - "pe.v"

pinout:
  # Inputs
  ui[0]: "SPI MOSI"
  ui[1]: "SPI CS (active low)"
  ui[2]: "SPI SCLK"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "result bit 0"
  uo[1]: "result bit 1"
  uo[2]: "result bit 2"
  uo[3]: "result bit 3"
  uo[4]: "result bit 4"
  uo[5]: "result bit 5"
  uo[6]: "result bit 6"
  uo[7]: "result bit 7"

  # Bidirectional pins
  uio[0]: "SPI MISO (output)"
  uio[1]: "ready (output)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

